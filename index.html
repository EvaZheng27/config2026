// ---------- helpers ----------
const KEY='config2026_plan';
function getSel(){try{return JSON.parse(localStorage.getItem(KEY))||[]}catch(e){return[]}}
function setSel(a){localStorage.setItem(KEY,JSON.stringify(a))}
function isSel(id){return getSel().indexOf(id)>=0}
function toggle(id){let a=getSel();const i=a.indexOf(id);if(i>=0)a.splice(i,1);else a.push(id);setSel(a);refresh();}

function venueHTML(d){
  if(!d.st)return '<span class="venue">📍 場館以現場 app 為準</span>';
  const v=STAGES[d.st];
  return '<span class="venue">📍 '+v.en+' · '+v.hall+'｜'+v.zh+'</span>';
}
function tagsHTML(d){
  let h='';
  if(d.mark==='must')h+='<span class="pill p-must">必聽</span>';
  else if(d.mark==='rec')h+='<span class="pill p-rec">推薦</span>';
  if(d.st==='lab')h+='<span class="pill p-rsvp">📌需預約</span>';
  d.th.forEach(t=>{h+='<span class="pill p-th">'+THEMES[t]+'</span>'});
  return h;
}
function cardHTML(d){
  return '<div class="card '+d.mark+'" data-id="'+d.id+'" data-mark="'+d.mark+'" data-th="'+d.th.join(' ')+'">'
    +'<button class="add'+(isSel(d.id)?' on':'')+'" data-id="'+d.id+'">'+(isSel(d.id)?'✓':'+')+'</button>'
    +'<p class="ttl">'+d.zh+'</p>'
    +'<p class="en">'+d.en+'</p>'
    +'<div class="tags">'+tagsHTML(d)+'</div>'
    +'<p class="meta">🕐 '+d.time+'　'+d.sp+'</p>'
    +venueHTML(d)
    +'<p class="desc">'+d.desc+'</p></div>';
}

// ---------- render browse days ----------
function renderDay(dayNum){
  const box=document.getElementById('d'+dayNum);
  const items=DATA.filter(x=>x.d===dayNum);
  let html='',lastSlot=null,buf=[];
  function flush(){
    if(!buf.length)return;
    const multi=buf.length>1?'<span class="multi">⚖️ 同時段 '+buf.length+' 場</span>':'';
    html+='<div class="slot"><div class="slot-h">'+lastSlot+multi+'</div>'+buf.map(cardHTML).join('')+'</div>';
    buf=[];
  }
  items.forEach(d=>{if(d.slot!==lastSlot){flush();lastSlot=d.slot;}buf.push(d);});
  flush();
  box.innerHTML=html;
}

// ---------- render my plan ----------
function renderMine(){
  const box=document.getElementById('mine');
  const items=DATA.filter(d=>isSel(d.id)).slice().sort((a,b)=>a.d-b.d||((a.s==null?9999:a.s)-(b.s==null?9999:b.s)));
  document.getElementById('cnt').textContent=items.length;
  if(!items.length){box.innerHTML='<div class="empty">還沒選任何場次 🗓️<br>到「6/24 / 6/25」分頁，點每張卡片右上的 ＋<br>加入後會出現在這裡，並自動幫你檢查時間衝突。</div>';return;}
  // conflicts
  const conf=new Set();const pairs=[];
  for(let i=0;i<items.length;i++)for(let j=i+1;j<items.length;j++){
    const a=items[i],b=items[j];
    if(a.d===b.d&&a.s!=null&&b.s!=null&&a.s<b.e&&b.s<a.e){conf.add(a.id);conf.add(b.id);pairs.push([a,b]);}
  }
  let html='<div class="toolbar"><span style="color:var(--sub);font-size:13px">已選 '+items.length+' 場</span><button class="clr" id="clrbtn">清空全部</button></div>';
  if(pairs.length){
    html+='<div class="banner">⚠️ <b>有 '+pairs.length+' 組時間衝突</b>，請二選一：<br>'
      +pairs.map(p=>'• 6/'+(p[0].d===1?'24':'25')+' '+p[0].time+'「'+p[0].zh+'」 ↔ '+p[1].time+'「'+p[1].zh+'」').join('<br>')+'</div>';
  }
  let lastDay=null;
  items.forEach(d=>{
    if(d.d!==lastDay){lastDay=d.d;html+='<div class="daylbl">'+(d.d===1?'6/24 週三':'6/25 週四')+'</div>';}
    const cf=conf.has(d.id)?' conf':'';
    html+='<div class="card '+d.mark+cf+'">'
      +(conf.has(d.id)?'<p class="meta" style="color:var(--warn);font-weight:700">⚠️ 時間衝突</p>':'')
      +'<p class="ttl">'+d.zh+'</p>'
      +'<div class="tags">'+tagsHTML(d)+'</div>'
      +'<p class="meta">🕐 '+d.time+'　'+d.sp+'</p>'
      +venueHTML(d)
      +'<button class="rm" data-id="'+d.id+'">✕ 移除</button></div>';
  });
  box.innerHTML=html;
  document.getElementById('clrbtn').onclick=function(){if(confirm('確定清空所有已選場次？')){setSel([]);refresh();}};
  box.querySelectorAll('.rm').forEach(b=>b.onclick=function(){toggle(this.dataset.id);});
}

// ---------- filters ----------
let activeThemes=new Set();
function buildThemeChips(){
  const box=document.getElementById('themechips');
  box.innerHTML=Object.keys(THEMES).map(k=>'<div class="chip" data-t="'+k+'">'+THEMES[k]+'</div>').join('');
  box.querySelectorAll('.chip').forEach(c=>c.onclick=function(){
    const t=this.dataset.t;
    if(activeThemes.has(t)){activeThemes.delete(t);this.classList.remove('on');}
    else{activeThemes.add(t);this.classList.add('on');}
    applyFilters();
  });
}
let markFilter='all';
function applyFilters(){
  document.querySelectorAll('#d1 .card, #d2 .card').forEach(c=>{
    const m=c.dataset.mark;
    const okMark = markFilter==='all'||(markFilter==='must'&&m==='must')||(markFilter==='rec'&&(m==='must'||m==='rec'));
    const ths=(c.dataset.th||'').split(' ').filter(Boolean);
    const okTheme = activeThemes.size===0||ths.some(t=>activeThemes.has(t));
    c.classList.toggle('hidden',!(okMark&&okTheme));
  });
  document.querySelectorAll('#d1 .slot, #d2 .slot').forEach(s=>{
    s.style.display = s.querySelectorAll('.card:not(.hidden)').length?'':'none';
  });
}

// ---------- refresh all ----------
function refresh(){
  renderDay(1);renderDay(2);renderMine();applyFilters();
  document.querySelectorAll('.add').forEach(b=>b.onclick=function(){toggle(this.dataset.id);});
}

// ---------- tabs ----------
const tabs=document.querySelectorAll('.tab'),days=document.querySelectorAll('.day');
tabs.forEach(t=>t.onclick=function(){
  tabs.forEach(x=>x.classList.remove('on'));days.forEach(x=>x.classList.remove('on'));
  t.classList.add('on');document.getElementById(t.dataset.day).classList.add('on');
  document.getElementById('filterbox').style.display=(t.dataset.day==='mine')?'none':'';
  window.scrollTo(0,0);
});
document.querySelectorAll('.flt').forEach(f=>f.onclick=function(){
  document.querySelectorAll('.flt').forEach(x=>x.classList.remove('on'));
  f.classList.add('on');markFilter=f.dataset.f;applyFilters();
});

// init
buildThemeChips();refresh();
</script>
